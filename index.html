<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- Tailwind+DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- Icons -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Styles -->

    <style>
        * {
            font-family: "Inter", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC]">

    <main class="w-[80%] mx-auto">

        <section id="header" class="w-[11/12]">

            <h1 id="title-text" class="font-bold text-4xl text-[#002C5C] mt-9">Job Application Tracker</h1>


            <div id="count-container" class="grid grid-cols-3 gap-3 py-5">

                <div id="total-div" class="bg-[#FFFFFF] p-5 rounded-xl">
                    <p>Total</p>
                    <h2 id="total-count" class="font-bold text-3xl">0</h2>
                </div>

                <div id="interview-div" class="bg-[#FFFFFF] p-5 rounded-xl">
                    <p>Interview</p>
                    <h2 id="interview-count" class="font-bold text-3xl text-green-500">0</h2>
                </div>

                <div id="rejected-div" class="bg-[#FFFFFF] p-5 rounded-xl">
                    <p>Rejected</p>
                    <h2 id="rejected_count" class="font-bold text-3xl text-red-600">0</h2>
                </div>

            </div>


        </section>

        <!-- LIne -->
        <hr class="mt-5">

        <section class="flex justify-between mb-5 mt-[60px]">

            <h1 class="font-bold text-2xl">Available Jobs</h1>
            <p>
                <span class="text-gray-600">8 </span>
                <span class="text-gray-600">Jobs</span>
            </p>

        </section>


        <section id="button-section" class="mb-10">

            <div id="buttons" class="flex gap-5 mt-5">

                <button onclick="btnAnimation('btn-all')" id="btn-all"
                    class="btn px-9 bg-blue-500 text-white">All</button>
                <button onclick="btnAnimation('btn-interview-page')" id="btn-interview-page"
                    class="btn px-9">Interview</button>
                <Button onclick="btnAnimation('btn-rejected-page')" id="btn-rejected-page"
                    class="btn px-9 ">Rejected</Button>
            </div>


        </section>


        <section id="card-section">


            <div id="all-card-container">

                <!-- Card-1 - Mobile First Corp -->
                <div id="card" class=" bg-white rounded-xl border border-gray-200 p-6 relative mt-5 mb-5">

                    <button id="delete-btn"
                        class="absolute top-4 right-4 p-2 rounded-full border border-gray-200 hover:bg-red-300">
                        <img src="./Resources/Trash.png" alt="">
                    </button>


                    <h2 class="text-xl font-semibold text-blue-900">Mobile First Corp</h2>

                    <p class="text-gray-600 mt-1">React Native Developer</p>


                    <p class="text-gray-500 mt-3">Remote • Full-time • $130,000 - $175,000</p>



                    <div class="status-div">

                        <p id="status-badge"
                            class="mt-4 inline-block px-4 py-2 text-sm font-medium bg-blue-100 text-blue-800 rounded-md">
                            NOT APPLIED</p>

                    </div>


                    <p class="text-gray-600 mt-4">Build cross-platform mobile applications using React Native.
                        Work on products used by millions of users worldwide.</p>


                    <div class="flex gap-3 mt-6">

                        <button id="btn-interview"
                            class="px-5 py-2 rounded-md border border-green-500 text-green-600 font-medium hover:bg-green-50">INTERVIEW</button>

                        <button id="btn-rejected"
                            class="px-5 py-2 rounded-md border border-red-500 text-red-600 font-medium hover:bg-red-50">REJECTED</button>



                    </div>







                </div>

         


            </div>

        </section>





    </main>




    <script src="./JS/script.js"></script>
</body>

</html>
